title: "ant0x"
description: "Blog personale su threat intelligence, detection engineering e automazione SOC"
url: "https://ant0x.github.io"
baseurl: ""
repository: "ant0x/ant0x.github.io"
remote_theme: jekyll-theme-modernist
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

header_pages:
  - index.md
  - about.md
  - resources.md

theme: jekyll-theme-modernist

# Custom CSS
sass:
  sass_dir: _sass

# General site settings
lang: "it"
timezone: "Europe/Rome"
show_excerpts: true

# Author
author:
  name: "ant0x"
  avatar: "/assets/images/avatar.png"

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

permalink: /:categories/:year/:month/:day/:title/

# Collections
collections:
  posts:
    output: true

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "ant0x"
      comments: false

# Minimal Mistakes options
minimal_mistakes:
  skin: "default"
  logo:
    src: "/assets/images/logo.png"

# Exclude from processing
exclude:
  - README.md
  - node_modules
